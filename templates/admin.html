<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | Attendance System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
            --success: #10b981;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: var(--bg);
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(59, 130, 246, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 100% 100%, rgba(16, 185, 129, 0.1) 0%, transparent 50%);
            color: var(--text);
            min-height: 100vh;
            padding: 2rem;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
            animation: fadeInDown 0.8s ease-out;
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.025em;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
            animation: fadeInUp 0.8s ease-out;
        }

        .stat-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            padding: 1.5rem;
            border-radius: 1rem;
            transition: transform 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
        }

        .stat-label {
            color: var(--text-dim);
            font-size: 0.875rem;
            margin-bottom: 0.5rem;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary);
        }

        .controls {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            animation: fadeInUp 0.8s ease-out 0.2s backwards;
        }

        .search-box {
            flex: 1;
            min-width: 300px;
            position: relative;
        }

        input, select {
            width: 100%;
            background: var(--card-bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            outline: none;
            transition: all 0.3s;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
        }

        .btn {
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            border: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
        }

        .btn-outline:hover {
            background: rgba(255,255,255,0.05);
        }

        .btn-danger {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .btn-danger:hover {
            background: #ef4444;
            color: white;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 1rem;
            overflow: hidden;
            animation: fadeInUp 0.8s ease-out 0.4s backwards;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            background: rgba(255,255,255,0.03);
            padding: 1rem;
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-dim);
            border-bottom: 1px solid var(--border);
        }

        td {
            padding: 1rem;
            border-bottom: 1px solid var(--border);
            font-size: 0.95rem;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background: rgba(255,255,255,0.02);
        }

        .date-badge {
            background: rgba(59, 130, 246, 0.1);
            color: var(--primary);
            padding: 0.25rem 0.75rem;
            border-radius: 1rem;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .time-text {
            color: var(--success);
            font-weight: 500;
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .loading {
            text-align: center;
            padding: 4rem;
            color: var(--text-dim);
        }

        @media (max-width: 768px) {
            body { padding: 1rem; }
            header { flex-direction: column; gap: 1rem; text-align: center; }
            .controls { flex-direction: column; }
            .search-box { min-width: 100%; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div>
                <h1>Attendance Dashboard</h1>
                <p style="color: var(--text-dim); margin-top: 0.5rem;">Manage and monitor daily attendance records</p>
            </div>
            <div style="display: flex; gap: 0.5rem;">
                <button class="btn btn-outline" onclick="fetchData()">Refresh</button>
                <a href="/download" class="btn btn-primary">Export Excel</a>
            </div>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Total Attendance</div>
                <div class="stat-value" id="stat-total">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Unique Users</div>
                <div class="stat-value" id="stat-users">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Records Today</div>
                <div class="stat-value" id="stat-today">-</div>
            </div>
        </div>

        <div class="controls">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Search by name..." onkeyup="filterData()">
            </div>
            <div style="min-width: 200px;">
                <input type="date" id="dateFilter" onchange="filterData()">
            </div>
            <button class="btn btn-danger" onclick="clearLogs()">Clear Logs</button>
        </div>

        <div class="card">
            <table id="attendanceTable">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Time</th>
                        <th>Name</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr>
                        <td colspan="4" class="loading">Loading attendance records...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        let allData = [];

        async function fetchData() {
            try {
                const response = await fetch('/api/attendance');
                const data = await response.json();
                allData = data.records;
                
                // Update stats
                document.getElementById('stat-total').innerText = allData.length;
                document.getElementById('stat-users').innerText = new Set(allData.map(r => r.Name)).size;
                
                const today = new Date().toISOString().split('T')[0];
                document.getElementById('stat-today').innerText = allData.filter(r => r.Date === today).length;

                renderTable(allData);
            } catch (err) {
                console.error("Fetch error:", err);
                document.getElementById('tableBody').innerHTML = '<tr><td colspan="4" class="loading" style="color: #ef4444;">Error loading data</td></tr>';
            }
        }

        function renderTable(data) {
            const tbody = document.getElementById('tableBody');
            if (data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" class="loading">No records found</td></tr>';
                return;
            }

            // Sort data chronologically (newest first)
            data.sort((a, b) => {
                const dateTimeA = new Date(a.Date + ' ' + a.Time);
                const dateTimeB = new Date(b.Date + ' ' + b.Time);
                return dateTimeB - dateTimeA;
            });

            tbody.innerHTML = data.map(row => `
                <tr>
                    <td><span class="date-badge">${row.Date}</span></td>
                    <td><span class="time-text">${row.Time}</span></td>
                    <td style="font-weight: 600;">${row.Name}</td>
                    <td><span style="color: var(--success);">● Present</span></td>
                </tr>
            `).join('');
        }

        function filterData() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const dateFilter = document.getElementById('dateFilter').value;

            const filtered = allData.filter(row => {
                const matchesName = row.Name.toLowerCase().includes(searchTerm);
                const matchesDate = !dateFilter || row.Date === dateFilter;
                return matchesName && matchesDate;
            });

            renderTable(filtered);
        }

        async function clearLogs() {
            if (confirm("Are you sure you want to delete all attendance records? This cannot be undone.")) {
                const response = await fetch('/clear_log');
                const msg = await response.text();
                alert(msg);
                fetchData();
            }
        }

        // Initial fetch
        fetchData();
        // Auto refresh every 30 seconds
        setInterval(fetchData, 30000);
    </script>
</body>
</html>
